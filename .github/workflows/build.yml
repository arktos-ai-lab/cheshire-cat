name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Tests (fast, runs on all platforms) ─────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies (Tauri / WebKit2GTK)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Run workspace tests
        run: cargo test --workspace

  # ── Desktop bundle (Windows) ─────────────────────────────────────────────────
  bundle-windows:
    name: Bundle (Windows)
    needs: test
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Windows)
        shell: bash
        run: npx tauri build --verbose
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: cheshire-cat-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Windows signatures
        uses: actions/upload-artifact@v4
        with:
          name: cheshire-cat-windows-sigs
          path: |
            target/release/bundle/msi/*.sig
            target/release/bundle/nsis/*.sig
          if-no-files-found: warn

  # ── Desktop bundle (macOS) ───────────────────────────────────────────────────
  bundle-macos:
    name: Bundle (macOS)
    needs: test
    runs-on: macos-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Configure macOS signing (skip if secrets absent)
        shell: bash
        env:
          _CERT: ${{ secrets.APPLE_CERTIFICATE }}
          _CERT_PWD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          _IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_PWD: ${{ secrets.APPLE_PASSWORD }}
          _TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Only export Apple signing vars when the secret is actually present.
          # An empty APPLE_CERTIFICATE string causes `security import` to fail,
          # so we must not set the variable at all when no certificate is provided.
          [ -n "$_CERT" ]     && echo "APPLE_CERTIFICATE=$_CERT"                         >> "$GITHUB_ENV" || true
          [ -n "$_CERT_PWD" ] && echo "APPLE_CERTIFICATE_PASSWORD=$_CERT_PWD"            >> "$GITHUB_ENV" || true
          [ -n "$_IDENTITY" ] && echo "APPLE_SIGNING_IDENTITY=$_IDENTITY"                >> "$GITHUB_ENV" || true
          [ -n "$_APPLE_ID" ] && echo "APPLE_ID=$_APPLE_ID"                              >> "$GITHUB_ENV" || true
          [ -n "$_APPLE_PWD" ] && echo "APPLE_PASSWORD=$_APPLE_PWD"                      >> "$GITHUB_ENV" || true
          [ -n "$_TEAM_ID" ]  && echo "APPLE_TEAM_ID=$_TEAM_ID"                          >> "$GITHUB_ENV" || true

      - name: Build Tauri app (macOS universal)
        run: npx tauri build --target universal-apple-darwin --verbose
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: cheshire-cat-macos
          path: target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload macOS signatures
        uses: actions/upload-artifact@v4
        with:
          name: cheshire-cat-macos-sigs
          path: target/universal-apple-darwin/release/bundle/dmg/*.sig
          if-no-files-found: warn

  # ── Desktop bundle (Linux) ───────────────────────────────────────────────────
  bundle-linux:
    name: Bundle (Linux)
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies (Tauri / WebKit2GTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Linux)
        run: npx tauri build --verbose
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: cheshire-cat-linux
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload Linux signatures
        uses: actions/upload-artifact@v4
        with:
          name: cheshire-cat-linux-sigs
          path: |
            target/release/bundle/appimage/*.sig
          if-no-files-found: warn

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Release
    needs: [bundle-windows, bundle-macos, bundle-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: cheshire-cat-windows
          path: dist/windows
        continue-on-error: true

      - name: Download Windows signatures
        uses: actions/download-artifact@v4
        with:
          name: cheshire-cat-windows-sigs
          path: dist/windows-sigs
        continue-on-error: true

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: cheshire-cat-macos
          path: dist/macos
        continue-on-error: true

      - name: Download macOS signatures
        uses: actions/download-artifact@v4
        with:
          name: cheshire-cat-macos-sigs
          path: dist/macos-sigs
        continue-on-error: true

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: cheshire-cat-linux
          path: dist/linux
        continue-on-error: true

      - name: Download Linux signatures
        uses: actions/download-artifact@v4
        with:
          name: cheshire-cat-linux-sigs
          path: dist/linux-sigs
        continue-on-error: true

      - name: Generate updater manifest (latest.json)
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Ensure dist/ exists even when all artifact downloads failed
          mkdir -p dist

          # Helper: safely read first .sig file in a directory
          read_sig() { local f; f="$(ls "$1"/*.sig 2>/dev/null | head -1)"; [ -f "$f" ] && cat "$f" || echo ""; }

          WIN_SIG="$(read_sig dist/windows-sigs)"
          MAC_SIG="$(read_sig dist/macos-sigs)"
          LIN_SIG="$(read_sig dist/linux-sigs)"

          # Helper: basename of first matching file
          first_file() { local f; f="$(ls "$1" 2>/dev/null | head -1)"; [ -f "$f" ] && basename "$f" || echo ""; }

          WIN_MSI="$(first_file 'dist/windows/*.msi')"
          WIN_EXE="$(first_file 'dist/windows/*.exe')"
          MAC_DMG="$(first_file 'dist/macos/*.dmg')"
          LIN_APPIMAGE="$(first_file 'dist/linux/*.AppImage')"

          # Prefer MSI over EXE for the updater URL
          [ -z "$WIN_MSI" ] && WIN_MSI="$WIN_EXE"

          python3 - <<PYEOF
          import json, os
          version       = "${VERSION}"
          pub_date      = "${PUB_DATE}"
          base_url      = "${BASE_URL}"
          win_msi       = "${WIN_MSI}"
          mac_dmg       = "${MAC_DMG}"
          lin_appimage  = "${LIN_APPIMAGE}"
          win_sig       = r"""${WIN_SIG}"""
          mac_sig       = r"""${MAC_SIG}"""
          lin_sig       = r"""${LIN_SIG}"""

          manifest = {
              "version": version,
              "notes": "See the GitHub release for details.",
              "pub_date": pub_date,
              "platforms": {}
          }
          if win_msi:
              manifest["platforms"]["windows-x86_64"] = {
                  "signature": win_sig,
                  "url": f"{base_url}/{win_msi}"
              }
          if mac_dmg:
              for arch in ("darwin-aarch64", "darwin-x86_64"):
                  manifest["platforms"][arch] = {
                      "signature": mac_sig,
                      "url": f"{base_url}/{mac_dmg}"
                  }
          if lin_appimage:
              manifest["platforms"]["linux-x86_64"] = {
                  "signature": lin_sig,
                  "url": f"{base_url}/{lin_appimage}"
              }

          with open("dist/latest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          print("Generated dist/latest.json")
          PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cheshire CAT ${{ github.ref_name }}"
          body: |
            ## Cheshire CAT ${{ github.ref_name }} — Developer Preview

            Cross-platform CAT tool built with Rust + Tauri 2. Spiritual successor to Felix CAT.

            > **Note:** This is an early developer preview. Core translation memory, AI suggestions,
            > and QA checks are functional. Office add-in integration is under active development.

            ### Downloads
            | File | Platform |
            |------|----------|
            | `*.msi` or `*-setup.exe` | Windows 10/11 x64 |
            | `*.dmg` | macOS (Apple Silicon + Intel universal) |
            | `*.AppImage` | Linux x64 (universal, no install needed) |
            | `*.deb` | Debian / Ubuntu x64 |

            ### What works in ${{ github.ref_name }}
            - Translation memory with fuzzy and exact matching
            - AI-assisted suggestions (via local Ollama or OpenAI API)
            - QA checks — tag consistency, number consistency
            - Multi-format import (XLIFF, plain text)
            - React/Tauri desktop shell

            ### Requirements
            - Windows 10/11 (64-bit), macOS 12+, or Linux x64 (WebKit2GTK 4.1)
            - For AI features: [Ollama](https://ollama.ai) with a supported model

            ---
            Original Felix CAT by Ryan Ginstrom. Cheshire CAT maintained by Ernst van Gassen. MIT licensed.

            [![Donate](https://img.shields.io/badge/Donate-PayPal-blue.svg)](https://paypal.me/VanGassen)
          files: |
            dist/windows/*.msi
            dist/windows/*.exe
            dist/macos/*.dmg
            dist/linux/*.AppImage
            dist/linux/*.deb
            dist/latest.json
          fail_on_unmatched_files: false
          generate_release_notes: false
          draft: false
          prerelease: true
