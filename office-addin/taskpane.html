<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Felix CAT</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #f8fafc;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0f172a;
      color: #f1f5f9;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    header svg { width: 18px; height: 18px; fill: #38bdf8; }

    .toolbar {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }

    button {
      padding: 5px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      background: #fff;
      color: #334155;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #f1f5f9; }
    button.primary { background: #0ea5e9; color: #fff; border-color: #0ea5e9; }
    button.primary:hover { background: #0284c7; }

    #status {
      padding: 6px 12px;
      font-size: 11px;
      color: #64748b;
      background: #f1f5f9;
      border-bottom: 1px solid #e2e8f0;
      min-height: 26px;
      flex-shrink: 0;
    }

    .panel { flex: 1; overflow-y: auto; padding: 8px 12px; }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
      margin: 8px 0 4px;
    }

    .match-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      margin-bottom: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .match-card:hover { border-color: #38bdf8; }

    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      font-size: 11px;
    }

    .score {
      font-weight: 700;
      font-size: 12px;
    }

    .score.exact { color: #059669; }
    .score.high  { color: #0ea5e9; }
    .score.mid   { color: #d97706; }
    .score.low   { color: #94a3b8; }

    .match-body { padding: 6px 10px; }

    .match-source {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .match-target {
      font-size: 12px;
      color: #1e293b;
      line-height: 1.5;
      font-weight: 500;
    }

    .glossary-row {
      display: flex;
      gap: 8px;
      align-items: baseline;
      padding: 4px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 12px;
    }

    .glossary-source { color: #475569; flex: 1; }
    .glossary-target { color: #0f172a; font-weight: 500; flex: 1; }

    .empty {
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
      padding: 24px 0;
    }
  </style>
</head>
<body>
  <header>
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0 0 14.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
    </svg>
    Felix CAT
  </header>

  <div class="toolbar">
    <button class="primary" id="btn-lookup">Look up selection</button>
    <button id="btn-insert">Insert match</button>
    <button id="btn-clear">Clear</button>
  </div>

  <div id="status">Ready — select text and click "Look up selection"</div>

  <div class="panel" id="panel">
    <div class="empty" id="empty-msg">No results yet.</div>
    <div id="tm-section" style="display:none">
      <div class="section-title">TM Matches</div>
      <div id="tm-results"></div>
    </div>
    <div id="gloss-section" style="display:none">
      <div class="section-title">Glossary</div>
      <div id="gloss-results"></div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:8765';
    let selectedMatch = null;

    Office.onReady(info => {
      document.getElementById('btn-lookup').addEventListener('click', lookup);
      document.getElementById('btn-insert').addEventListener('click', insertMatch);
      document.getElementById('btn-clear').addEventListener('click', clearPanel);
    });

    async function getSelectionText() {
      return new Promise((resolve, reject) => {
        if (Office.context.host === Office.HostType.Word) {
          Word.run(async ctx => {
            const sel = ctx.document.getSelection();
            sel.load('text');
            await ctx.sync();
            resolve(sel.text.trim());
          }).catch(reject);
        } else {
          Office.context.document.getSelectedDataAsync(
            Office.CoercionType.Text,
            r => r.status === Office.AsyncResultStatus.Succeeded
              ? resolve(r.value.trim())
              : reject(r.error)
          );
        }
      });
    }

    async function lookup() {
      let text;
      try {
        text = await getSelectionText();
      } catch (e) {
        setStatus('Could not read selection: ' + e.message, true);
        return;
      }

      if (!text) {
        setStatus('Please select some text first.', true);
        return;
      }

      setStatus('Searching…');
      clearPanel();

      try {
        const [tmResp, glossResp] = await Promise.all([
          fetch(`${API}/api/search`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: text }),
          }),
          fetch(`${API}/api/glossary`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text }),
          }),
        ]);

        const tmData = await tmResp.json();
        const glossData = await glossResp.json();

        renderMatches(tmData.matches || []);
        renderGlossary(glossData.hits || []);
        setStatus(`Found ${(tmData.matches || []).length} TM match(es), ${(glossData.hits || []).length} glossary hit(s).`);
      } catch (e) {
        setStatus('Felix is not running. Start the Felix CAT app first.', true);
      }
    }

    function renderMatches(matches) {
      const container = document.getElementById('tm-results');
      const section = document.getElementById('tm-section');
      const empty = document.getElementById('empty-msg');

      if (matches.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      empty.style.display = 'none';
      container.innerHTML = '';

      matches.forEach((m, i) => {
        const score = m.score;
        const scoreClass = score === 100 ? 'exact' : score >= 85 ? 'high' : score >= 70 ? 'mid' : 'low';
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
          <div class="match-header">
            <span>${m.record?.source_lang || ''} → ${m.record?.target_lang || ''}</span>
            <span class="score ${scoreClass}">${score}%</span>
          </div>
          <div class="match-body">
            <div class="match-source">${escHtml(m.record?.source || '')}</div>
            <div class="match-target">${escHtml(m.record?.target || '')}</div>
          </div>`;
        card.addEventListener('click', () => {
          document.querySelectorAll('.match-card').forEach(c => c.style.borderColor = '');
          card.style.borderColor = '#38bdf8';
          selectedMatch = m.record?.target || '';
        });
        container.appendChild(card);
      });
    }

    function renderGlossary(hits) {
      const container = document.getElementById('gloss-results');
      const section = document.getElementById('gloss-section');
      const empty = document.getElementById('empty-msg');

      if (hits.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      if (document.getElementById('tm-section').style.display === 'none') {
        empty.style.display = 'none';
      }
      container.innerHTML = '';

      hits.forEach(h => {
        const row = document.createElement('div');
        row.className = 'glossary-row';
        row.innerHTML = `
          <span class="glossary-source">${escHtml(h.term?.source_term || '')}</span>
          <span class="glossary-target">${escHtml(h.term?.target_term || '')}</span>`;
        container.appendChild(row);
      });
    }

    async function insertMatch() {
      if (!selectedMatch) {
        setStatus('Select a TM match first.', true);
        return;
      }
      try {
        if (Office.context.host === Office.HostType.Word) {
          await Word.run(async ctx => {
            ctx.document.getSelection().insertText(selectedMatch, Word.InsertLocation.replace);
            await ctx.sync();
          });
        } else {
          await new Promise((res, rej) =>
            Office.context.document.setSelectedDataAsync(
              selectedMatch,
              r => r.status === Office.AsyncResultStatus.Succeeded ? res() : rej(r.error)
            )
          );
        }
        setStatus('Match inserted.');
      } catch (e) {
        setStatus('Insert failed: ' + e.message, true);
      }
    }

    function clearPanel() {
      selectedMatch = null;
      document.getElementById('tm-results').innerHTML = '';
      document.getElementById('gloss-results').innerHTML = '';
      document.getElementById('tm-section').style.display = 'none';
      document.getElementById('gloss-section').style.display = 'none';
      document.getElementById('empty-msg').style.display = '';
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.style.color = isError ? '#dc2626' : '#64748b';
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
